<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="380" height="84" viewBox="0 0 380 84" role="img" aria-labelledby="title desc">
  <title id="title">PdfPix wordmark</title>
  <desc id="desc">PDF wordmark, a red laptop-inspired pixel icon, and PIX wordmark.</desc>
  <defs>
    <linearGradient id="pix-laptop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6252"/>
      <stop offset="100%" stop-color="#d92e24"/>
    </linearGradient>
    <style>
      .brand-text {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 56px;
        font-weight: 700;
        fill: #111111;
        letter-spacing: -1px;
      }
    </style>
